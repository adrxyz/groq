<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - Pro Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-800 flex flex-col border-r border-slate-700">
        <div class="p-4 border-b border-slate-700">
            <button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 p-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-all font-semibold">
                <span>+</span> New Chat
            </button>
        </div>

        <nav id="history-list" class="flex-1 overflow-y-auto p-2 space-y-1">
            </nav>

        <div class="p-4 border-t border-slate-700 space-y-2">
            <button id="settings-btn" class="w-full text-left p-2 hover:bg-slate-700 rounded transition-all text-sm">⚙️ Settings</button>
            <button id="clear-btn" class="w-full text-left p-2 hover:bg-red-900/30 text-red-400 rounded transition-all text-sm">🗑️ Delete History</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>

        <footer class="p-4 bg-slate-900">
            <form id="chat-form" class="max-w-3xl mx-auto relative">
                <input type="text" id="user-input" placeholder="Message Claude Haiku..." 
                    class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit" class="absolute right-3 top-3 p-1 text-indigo-400 hover:text-white transition-all">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
                </button>
            </form>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
