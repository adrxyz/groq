version: '3.8'

services:
  # 1. The Database (Memory)
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 2. Your n8n Server
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-server
    restart: always
    ports:
      - "5678:5678"
    depends_on:
      - redis
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_ENCRYPTION_KEY=n8n_sec_9uR2mX8vK4pQ7tZ1
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
    volumes:
      - n8n_data:/home/node/.n8n

  # 3. The Bridge (Auto-Discovery Mode)
  n8n-openai-bridge:
    image: ghcr.io/sveneisenschmidt/n8n-openai-bridge:latest
    container_name: n8n-openai-bridge
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - n8n
    environment:
      - BEARER_TOKEN=n8n_sec_9uR2mX8vK4pQ7tZ1
      - MODEL_LOADER_TYPE=n8n-api
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_BEARER_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJlOGQ0ZDMwYS1lZWVkLTRlOGUtOGYyOS0yMTk4NzYxOTViNTciLCJpc3MiOiJuOG4iLCJhdWQiOiJwdWJsaWMtYXBpIiwianRpIjoiNDgwNmY1ZDktZTJhNi00ZTRjLWIyZTItZTUxNjViZGRlYjkxIiwiaWF0IjoxNzcxNjA1MjQxLCJleHAiOjE3NzQxNTIwMDB9.ny4DSAnFSvDxprz5l382kd7YY2qlPftPbcH4bAmArJA  # <-- Keep this as-is until n8n boots!
      - AUTO_DISCOVERY_TAG=n8n-openai-bridge

# Let Docker manage the permissions automatically
volumes:
  n8n_data:
  redis_data: